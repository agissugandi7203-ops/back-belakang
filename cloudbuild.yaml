steps:
  # Build and Deploy backend directly to Cloud Run using --source option
  # This avoids manual docker push to deprecated gcr.io and auto-creates Artifact Registry repositories
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'backbelakang'
      - '--source'
      - '.'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
