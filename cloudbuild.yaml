steps:
  # 1. Build the container image using Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backbelakang:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backbelakang:latest'
      - '.'

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backbelakang:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backbelakang:latest'

  # 3. Deploy the container image to Cloud Run service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'backbelakang'
      - '--image'
      - 'gcr.io/$PROJECT_ID/backbelakang:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/backbelakang:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/backbelakang:latest'

options:
  logging: CLOUD_LOGGING_ONLY
